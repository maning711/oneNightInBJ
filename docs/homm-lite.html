<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>北境征途 - 原型</title>
    <meta
      name="description"
      content="一个类英雄无敌的网页原型：20x20 格子地图、城堡、资源点、英雄移动、回合推进与极简战斗。"
    />
    <style>
      :root {
        --bg: #111417;
        --panel: rgba(24, 29, 36, 0.92);
        --panel-2: rgba(36, 43, 52, 0.94);
        --line: rgba(255, 255, 255, 0.08);
        --text: #ecf3fb;
        --muted: rgba(236, 243, 251, 0.68);
        --gold: #d7b46a;
        --blue: #5ea7ff;
        --red: #ff7373;
        --green: #67cc8e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 15% 15%, rgba(94, 167, 255, 0.14), transparent 24%),
          radial-gradient(circle at 90% 10%, rgba(215, 180, 106, 0.14), transparent 20%),
          linear-gradient(180deg, #151a20 0%, #0e1115 100%);
        color: var(--text);
        font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      }

      .page {
        width: min(1400px, calc(100vw - 24px));
        margin: 18px auto;
        display: grid;
        grid-template-columns: minmax(720px, 1fr) 340px;
        gap: 16px;
      }

      .board,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(10px);
      }

      .board {
        padding: 18px;
      }

      .board-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 16px;
      }

      .board-head h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 42px);
        line-height: 1;
      }

      .board-head p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.07);
        font-size: 12px;
      }

      .map-wrap {
        overflow: auto;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(8, 10, 14, 0.7);
      }

      .map {
        display: grid;
        grid-template-columns: repeat(20, 32px);
        grid-template-rows: repeat(20, 32px);
        gap: 2px;
        padding: 12px;
        width: fit-content;
        margin: 0 auto;
      }

      .tile {
        width: 32px;
        height: 32px;
        border: 0;
        padding: 0;
        border-radius: 8px;
        color: var(--text);
        background: #24303a;
        position: relative;
        cursor: pointer;
        transition: transform 120ms ease, outline-color 120ms ease, filter 120ms ease;
      }

      .tile:hover {
        transform: translateY(-1px);
        filter: brightness(1.08);
      }

      .tile.grass { background: #335540; }
      .tile.forest { background: #244737; }
      .tile.hill { background: #5c4935; }
      .tile.water { background: #204c74; }
      .tile.road { background: #596068; }

      .tile.reachable {
        outline: 2px solid rgba(94, 167, 255, 0.7);
        outline-offset: -2px;
      }

      .tile.selected {
        outline: 2px solid rgba(255, 214, 92, 0.95);
        outline-offset: -2px;
      }

      .entity {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 20px;
        line-height: 1;
        pointer-events: none;
      }

      .entity.resource { color: #ffd66d; }
      .entity.castle { color: #ff9f6e; }
      .entity.mine { color: #77d79a; }
      .entity.hero-blue { color: #8ac1ff; }
      .entity.hero-red { color: #ff9595; }

      .tile .badge {
        position: absolute;
        right: 3px;
        bottom: 2px;
        font-size: 10px;
        color: #fff;
        font-weight: 700;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }

      .panel {
        padding: 16px;
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .panel h2,
      .panel h3 {
        margin: 0;
      }

      .card {
        padding: 14px;
        border-radius: 16px;
        background: var(--panel-2);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .stat {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
      }

      .stat .label {
        font-size: 12px;
        color: var(--muted);
      }

      .stat .value {
        margin-top: 4px;
        font-size: 22px;
        font-weight: 700;
      }

      .resources,
      .army-list {
        display: grid;
        gap: 8px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 14px;
        color: var(--muted);
      }

      .row strong {
        color: var(--text);
      }

      .army-item {
        padding: 9px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .army-item .name {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .star {
        font-size: 15px;
      }

      .log {
        max-height: 220px;
        overflow: auto;
        display: grid;
        gap: 8px;
      }

      .log-entry {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.22);
        font-size: 13px;
        line-height: 1.5;
        color: #e3edf8;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      button.action {
        border: 0;
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(180deg, #5e7dff 0%, #4258c9 100%);
      }

      button.action.secondary {
        background: linear-gradient(180deg, #515b68 0%, #3e4650 100%);
      }

      .tip {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
      }

      @media (max-width: 1180px) {
        .page {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script defer src="./src/homm-lite.js"></script>
  </head>
  <body>
    <div class="page">
      <section class="board">
        <div class="board-head">
          <div>
            <h1>北境征途</h1>
            <p>类英雄无敌的最小原型：地图探索、占点、资源、招募与极简战斗。</p>
          </div>
          <div class="pill-row">
            <div class="pill">20×20 地图</div>
            <div class="pill">回合制</div>
            <div class="pill">单英雄原型</div>
          </div>
        </div>
        <div class="map-wrap">
          <div class="map" id="map"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="card">
          <h2>回合信息</h2>
          <div class="stats">
            <div class="stat">
              <div class="label">天数</div>
              <div class="value" id="day"></div>
            </div>
            <div class="stat">
              <div class="label">移动力</div>
              <div class="value" id="moves"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>你的资源</h3>
          <div class="resources" id="resources"></div>
        </div>

        <div class="card">
          <h3>英雄状态</h3>
          <div class="row"><span>位置</span><strong id="hero-pos"></strong></div>
          <div class="row"><span>攻击</span><strong id="hero-attack"></strong></div>
          <div class="row"><span>防御</span><strong id="hero-defense"></strong></div>
          <div class="row"><span>战力</span><strong id="hero-power"></strong></div>
          <div class="army-list" id="army"></div>
        </div>

        <div class="card">
          <h3>城堡</h3>
          <div class="row"><span>等级</span><strong id="castle-level"></strong></div>
          <div class="row"><span>驻军增长</span><strong id="castle-growth"></strong></div>
          <div class="actions">
            <button class="action" id="recruit-btn">招募本周兵力</button>
            <button class="action secondary" id="end-turn-btn">结束今天</button>
          </div>
        </div>

        <div class="card">
          <h3>说明</h3>
          <div class="tip">
            点击地图上的高亮格移动英雄。拾取资源、占矿、打掉红色敌军。每天结束时资源矿产出，城堡每周刷新兵力。第一版战斗用总战力直接结算。
          </div>
        </div>

        <div class="card">
          <h3>战报</h3>
          <div class="log" id="log"></div>
        </div>
      </aside>
    </div>
  </body>
</html>
