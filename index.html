<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="北漂浮生：在北京打拼的生存经营游戏。倒货、打工、交友、炒股、换片区，想办法把日子滚起来。"
    />
    <meta name="theme-color" content="#1f1610" />
    <meta property="og:title" content="北漂浮生" />
    <meta
      property="og:description"
      content="在北京打拼的生存经营游戏。60 天内，想办法活下去，再尽量站稳脚。"
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="./src/favicon.svg" type="image/svg+xml" />
    <title>北漂浮生</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #120f0d;
      }

      #game-root {
        width: 100%;
        height: 100%;
      }

      .boot-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(212, 132, 62, 0.28), transparent 28%),
          radial-gradient(circle at 80% 10%, rgba(112, 58, 39, 0.3), transparent 24%),
          linear-gradient(180deg, #201712 0%, #120f0d 58%, #0b0908 100%);
        color: #f0dfc0;
        font-family: "Songti SC", "STSong", "Noto Serif SC", serif;
        transition: opacity 280ms ease;
      }

      .boot-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-card {
        width: min(680px, calc(100vw - 40px));
        padding: 28px 30px;
        border-radius: 24px;
        border: 1px solid rgba(241, 212, 168, 0.12);
        background: rgba(28, 20, 16, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(10px);
      }

      .boot-kicker {
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #d4a069;
      }

      .boot-card h1 {
        margin: 12px 0 10px;
        font-size: clamp(34px, 8vw, 58px);
        line-height: 1;
      }

      .boot-card p {
        margin: 0;
        font-size: 15px;
        line-height: 1.7;
        color: rgba(240, 223, 192, 0.84);
      }

      .boot-meta {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .boot-chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(212, 160, 105, 0.1);
        border: 1px solid rgba(212, 160, 105, 0.15);
        font-size: 12px;
      }
    </style>
    <script src="./src/vendor/phaser.min.js"></script>
    <script defer src="./src/game.js"></script>
  </head>
  <body>
    <div class="boot-screen" id="boot-screen">
      <div class="boot-card">
        <div class="boot-kicker">Beijing Hustle Sim</div>
        <h1>北漂浮生</h1>
        <p>在北京打拼的生存经营游戏。60 天里，打工、倒货、交友、炒股、换片区，想办法先活下去，再把日子滚起来。</p>
        <div class="boot-meta">
          <div class="boot-chip">生存经营</div>
          <div class="boot-chip">桌面版 + GitHub Pages</div>
          <div class="boot-chip">建议横屏 / 桌面访问</div>
        </div>
      </div>
    </div>
    <div id="game-root"></div>
  </body>
</html>
